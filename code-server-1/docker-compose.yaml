services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server-1
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PASSWORD=
      - PROXY_DOMAIN=code-1.gasket-dev.local
    volumes:
      - ./data:/config
      - ../code-server-shared/install-extensions.sh:/custom-cont-init.d/install-extensions.sh:ro
      - ../code-server-shared/settings.json:/defaults/settings.json:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "portal.gasket-dev.local:host-gateway"
      - "traefik.gasket-dev.local:host-gateway"
      - "traefik-metrics.gasket-dev.local:host-gateway"
      - "authentik.gasket-dev.local:host-gateway"
      - "authentik-metrics.gasket-dev.local:host-gateway"
      - "opensearch.gasket-dev.local:host-gateway"
      - "opensearch-dashboard.gasket-dev.local:host-gateway"
      - "prometheus.gasket-dev.local:host-gateway"
      - "grafana.gasket-dev.local:host-gateway"
      - "open-webui.gasket-dev.local:host-gateway"
      - "ollama-external.gasket-dev.local:host-gateway"
      - "ollama-external-metrics.gasket-dev.local:host-gateway"
      - "ollama-internal.gasket-dev.local:host-gateway"
      - "ollama-internal-metrics.gasket-dev.local:host-gateway"
      - "code-1.gasket-dev.local:host-gateway"
      - "code-2.gasket-dev.local:host-gateway"
      - "code-3.gasket-dev.local:host-gateway"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy-1
    env_file:
      - .env
    command:
      - --provider=oidc
      - --oidc-issuer-url=https://authentik.gasket-dev.local/application/o/code-server-1/
      - --client-id=${OAUTH2_PROXY_CLIENT_ID}
      - --client-secret=${OAUTH2_PROXY_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-secure=true
      - --cookie-domain=.gasket-dev.local
      - --upstream=http://code-server:8443
      - --http-address=0.0.0.0:4180
      - --redirect-url=https://code-1.gasket-dev.local/oauth2/callback
      - --email-domain=*
      - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails
      - --scope=openid profile email groups
      - --ssl-insecure-skip-verify=true
      - --upstream-timeout=30s
      - --pass-authorization-header=true
      - --pass-user-headers=true
      - --set-xauthrequest=true
    ports:
      - "4180:4180"
    volumes:
      - ./allowed-emails:/etc/oauth2-proxy/allowed-emails:ro
    depends_on:
      - code-server
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "portal.gasket-dev.local:host-gateway"
      - "traefik.gasket-dev.local:host-gateway"
      - "traefik-metrics.gasket-dev.local:host-gateway"
      - "authentik.gasket-dev.local:host-gateway"
      - "authentik-metrics.gasket-dev.local:host-gateway"
      - "opensearch.gasket-dev.local:host-gateway"
      - "opensearch-dashboard.gasket-dev.local:host-gateway"
      - "prometheus.gasket-dev.local:host-gateway"
      - "grafana.gasket-dev.local:host-gateway"
      - "open-webui.gasket-dev.local:host-gateway"
      - "ollama-external.gasket-dev.local:host-gateway"
      - "ollama-external-metrics.gasket-dev.local:host-gateway"
      - "ollama-internal.gasket-dev.local:host-gateway"
      - "ollama-internal-metrics.gasket-dev.local:host-gateway"
      - "code-1.gasket-dev.local:host-gateway"
      - "code-2.gasket-dev.local:host-gateway"
      - "code-3.gasket-dev.local:host-gateway"
