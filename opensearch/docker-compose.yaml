services:
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: opensearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9600:9600" # Performance Analyzer
    env_file:
      - .env
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-SecurePass!123}
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "portal.gasket-dev.local:host-gateway"
      - "traefik.gasket-dev.local:host-gateway"
      - "authentik.gasket-dev.local:host-gateway"
      - "opensearch.gasket-dev.local:host-gateway"
      - "opensearch-dashboard.gasket-dev.local:host-gateway"
      - "prometheus.gasket-dev.local:host-gateway"
      - "grafana.gasket-dev.local:host-gateway"
      - "open-webui.gasket-dev.local:host-gateway"
      - "ollama-external.gasket-dev.local:host-gateway"
      - "ollama-internal.gasket-dev.local:host-gateway"
      - "code-1.gasket-dev.local:host-gateway"
      - "code-2.gasket-dev.local:host-gateway"
      - "code-3.gasket-dev.local:host-gateway"
      - "traefik-metrics.gasket-dev.local:host-gateway"
      - "authentik-metrics.gasket-dev.local:host-gateway"
      - "ollama-external-metrics.gasket-dev.local:host-gateway"
      - "ollama-internal-metrics.gasket-dev.local:host-gateway"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    container_name: opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    env_file:
      - .env
    environment:
      # Point at the host-published OpenSearch port
      - OPENSEARCH_HOSTS=["http://host.docker.internal:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "portal.gasket-dev.local:host-gateway"
      - "traefik.gasket-dev.local:host-gateway"
      - "authentik.gasket-dev.local:host-gateway"
      - "opensearch.gasket-dev.local:host-gateway"
      - "opensearch-dashboard.gasket-dev.local:host-gateway"
      - "prometheus.gasket-dev.local:host-gateway"
      - "grafana.gasket-dev.local:host-gateway"
      - "open-webui.gasket-dev.local:host-gateway"
      - "ollama-external.gasket-dev.local:host-gateway"
      - "ollama-internal.gasket-dev.local:host-gateway"
      - "code-1.gasket-dev.local:host-gateway"
      - "code-2.gasket-dev.local:host-gateway"
      - "code-3.gasket-dev.local:host-gateway"
      - "traefik-metrics.gasket-dev.local:host-gateway"
      - "authentik-metrics.gasket-dev.local:host-gateway"
      - "ollama-external-metrics.gasket-dev.local:host-gateway"
      - "ollama-internal-metrics.gasket-dev.local:host-gateway"

volumes:
  opensearch_data:
    driver: local
