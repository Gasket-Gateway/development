http:
  serversTransports:
    # Used for backends that serve self-signed / unverified HTTPS
    insecure:
      insecureSkipVerify: true

  routers:
    traefik-dashboard:
      rule: "Host(`traefik.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: api@internal

    traefik-metrics:
      rule: "Host(`traefik-metrics.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: traefik-metrics

    authentik:
      rule: "Host(`authentik.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: authentik

    authentik-metrics:
      rule: "Host(`authentik-metrics.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: authentik-metrics

    prometheus:
      rule: "Host(`prometheus.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: prometheus

    grafana:
      rule: "Host(`grafana.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: grafana

    opensearch:
      rule: "Host(`opensearch.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: opensearch

    opensearch-dashboard:
      rule: "Host(`opensearch-dashboard.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: opensearch-dashboard

    open-webui:
      rule: "Host(`open-webui.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: open-webui

    ollama-external:
      rule: "Host(`ollama-external.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: ollama-external

    ollama-external-metrics:
      rule: "Host(`ollama-external-metrics.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: ollama-external-metrics

    ollama-internal:
      rule: "Host(`ollama-internal.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: ollama-internal

    ollama-internal-metrics:
      rule: "Host(`ollama-internal-metrics.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: ollama-internal-metrics

    code-1:
      rule: "Host(`code-1.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: code-1

    code-2:
      rule: "Host(`code-2.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: code-2

    code-3:
      rule: "Host(`code-3.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: code-3

    gasket-portal:
      rule: "Host(`portal.gasket-dev.local`)"
      entryPoints: [websecure]
      tls: {}
      service: gasket-portal

  services:
    authentik:
      loadBalancer:
        serversTransport: insecure
        servers:
          - url: "https://host.docker.internal:9443"

    authentik-metrics:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9300"

    traefik-metrics:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8082"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9090"

    grafana:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"

    opensearch:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9200"

    opensearch-dashboard:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5601"

    open-webui:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3001"

    ollama-external:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:12434"

    ollama-external-metrics:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:12434"

    ollama-internal:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:11434"

    ollama-internal-metrics:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:11434"

    code-1:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:4180"

    code-2:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:4181"

    code-3:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:4182"

    gasket-portal:
      loadBalancer:
        healthCheck:
          path: /health
          interval: "10s"
          timeout: "3s"
        servers:
          - url: "http://host.docker.internal:5000"
          - url: "http://host.docker.internal:5001"
          - url: "http://host.docker.internal:5002"
